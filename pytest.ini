[pytest]
pythonpath = . k_back
asyncio_mode = auto
log_cli = true
log_cli_level = WARNING
# INFO, WARNING
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
log_file = tests.log
# log_file_level = DEBUG
# Display test session start/end with database cleanup messages
addopts = -v --tb=short -s

# === カバレッジ設定 ===
# カバレッジ測定を有効にする場合は以下のコマンドを使用:
#   pytest --cov=app --cov-report=html --cov-report=term
#
# ダッシュボード関連のみカバレッジ測定:
#   pytest tests/crud/test_crud_dashboard*.py --cov=app.crud.crud_dashboard --cov=app.api.v1.endpoints.dashboard --cov-report=html --cov-report=term
#
# カバレッジ目標: 80%以上

# === テスト並列実行の使い方 ===
#
# 基本的な並列実行（CPUコア数に応じて自動調整）:
#   pytest -n auto
#
# 特定のワーカー数で実行:
#   pytest -n 4  # 4並列
#
# 並列実行 + パフォーマンステストを除外:
#   pytest -n auto -m "not performance"
#
# デフォルトで並列実行を有効にする場合は、以下を addopts に追加:
#   addopts = -v --tb=short -s -n auto
#
# 注意事項:
# - データベース接続プールサイズ（pool_size + max_overflow）がワーカー数より大きいこと
# - 現在の設定: pool_size=10, max_overflow=20 → 最大30並列まで対応可能

markers =
    integration: marks tests as integration tests (requires Google Calendar API access)
    performance: marks tests as performance tests (deselect with '-m "not performance"')
    slow: marks tests as slow tests requiring large dataset setup (deselect with '-m "not slow"')